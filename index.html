const elements=["전체","땅","물","불","바람","빛","어둠","황혼","여명","악몽"];
const types=["전체","체력","공격","방어","체공","체방","공방"];
let eFilter="전체",tFilter="전체";

function buildFilters(){
  const fr=document.getElementById("filter-row");
  fr.innerHTML="";
  elements.forEach(e=>{
    const b=document.createElement("button");
    b.className="ftag"+(eFilter===e?" active":"");
    b.textContent=e;
    b.onclick=()=>{eFilter=e;render();};
    fr.appendChild(b);
  });
  const sep=document.createElement("span");
  sep.style="display:block;width:100%;height:0;margin:2px 0";
  fr.appendChild(sep);
  types.forEach(t=>{
    const b=document.createElement("button");
    b.className="ftag"+(tFilter===t?" active":"");
    b.textContent=t;
    b.onclick=()=>{tFilter=t;render();};
    fr.appendChild(b);
  });
}

function render(){
  buildFilters();
  const q=document.getElementById("q").value.trim();
  let list=data;
  if(eFilter!=="전체") list=list.filter(d=>d.e===eFilter);
  if(tFilter!=="전체") list=list.filter(d=>d.t===tFilter);
  if(q) list=list.filter(d=>d.n.includes(q));
  list=list.slice().sort((a,b)=>b.g-a.g);

  const tbody=document.getElementById("tbody");
  const cnt=document.getElementById("count");
  cnt.textContent=`${list.length}마리`;
  tbody.innerHTML="";

  if(!list.length){
    tbody.innerHTML='<tr class="no-res"><td colspan="6">검색 결과가 없습니다</td></tr>';
    return;
  }

  list.forEach(d=>{
    const [bg,tx]=elementColors[d.e]||["#f5f5f5","#333"];
    const gPos=d.g>=0;
    const imgCell=d.img
      ?`<img src="${d.img}" class="dragon-img" alt="${d.n}">`
      :`<div class="img-placeholder">?</div>`;
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td class="center">${imgCell}</td>
      <td style="font-weight:500">${d.n}</td>
      <td class="center"><span class="badge-elem" style="background:${bg};color:${tx}">${d.e}</span></td>
      <td class="center"><span class="badge-type">${d.t}</span></td>
      <td class="center ${d.lv==='O'?'lv-o':'lv-x'}">${d.lv}</td>
      <td class="center ${gPos?'tier-pos':'tier-neg'}">${d.g.toFixed(3).replace(/\.?0+$/,'')}</td>`;
    tbody.appendChild(tr);
  });
}
render();
</script>
